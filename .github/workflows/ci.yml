name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref (e.g. on rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.9'
  # The Sanity client is instantiated at module load, so a production build
  # needs these public vars to be defined. CI uses dummy values: the resume
  # pages fetch their data client-side at runtime, so the build and the
  # accessibility audit do not depend on a live dataset.
  NEXT_PUBLIC_SANITY_PROJECT_ID: dummy
  NEXT_PUBLIC_SANITY_TOKEN: dummy
  NEXT_PUBLIC_SERVICE_ID: dummy
  NEXT_PUBLIC_TEMPLATE_ID: dummy
  NEXT_PUBLIC_USER_ID: dummy

defaults:
  run:
    working-directory: react-resume-template

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: react-resume-template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (informative)
        # Non-blocking: surfaces Prettier drift without failing the build.
        run: pnpm exec prettier --check './src/**/*.{js,jsx,json,ts,tsx}' || true

      - name: Test with coverage
        # Blocking: `vitest run --coverage` enforces the 80% thresholds
        # configured in vitest.config.ts.
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: react-resume-template/coverage
          if-no-files-found: ignore

      - name: Type-check & build
        # `pnpm build` runs `tsc --build` then `next build`, so this gate
        # covers both type errors and a successful production compile.
        run: pnpm build

      - name: Audit dependencies (informative)
        # Full report including moderate/low. The blocking gate lives in the
        # dedicated `dependency-audit` job below.
        run: pnpm audit || true

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: react-resume-template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fail on new high+ vulnerabilities
        # Known pre-existing advisories are allowlisted in audit-ci.jsonc, so
        # this only blocks on NEW high/critical issues.
        run: pnpm dlx audit-ci --config ./audit-ci.jsonc

  lighthouse-accessibility:
    name: Lighthouse accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: react-resume-template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI (accessibility >= 0.9)
        # lighthouserc.json starts `pnpm start`, audits / and /audioplayer,
        # and fails the job if the accessibility score drops below 0.9.
        run: pnpm dlx @lhci/cli@0.15.x autorun --config=./lighthouserc.json
